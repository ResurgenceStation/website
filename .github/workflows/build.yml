name: build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install --no-audit --no-fund
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: site
          path: _site
          retention-days: 7
